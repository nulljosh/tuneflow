<svg width="1200" height="600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, sans-serif; fill: #1d1d1f; }
      .title { font-size: 24px; font-weight: 700; }
      .subtitle { font-size: 12px; fill: #86868b; }
      .box { fill: rgba(0, 113, 227, 0.1); stroke: #0071e3; stroke-width: 2; rx: 12; }
      .arrow { stroke: #0071e3; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#0071e3" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="600" y="40" text-anchor="middle" class="title">TuneFlow Architecture</text>
  <text x="600" y="60" text-anchor="middle" class="subtitle">AI-powered Apple Music automation</text>

  <!-- Pipeline -->
  <rect x="50" y="100" width="220" height="80" class="box"/>
  <text x="160" y="135" text-anchor="middle" font-size="16" font-weight="600">AppleScript API</text>
  <text x="160" y="155" text-anchor="middle" font-size="12" fill="#86868b">Music.app control</text>

  <line x1="270" y1="140" x2="320" y2="140" class="arrow"/>

  <rect x="320" y="100" width="220" height="80" class="box"/>
  <text x="430" y="135" text-anchor="middle" font-size="16" font-weight="600">Automation Engine</text>
  <text x="430" y="155" text-anchor="middle" font-size="12" fill="#86868b">25+ commands</text>

  <line x1="540" y1="140" x2="590" y2="140" class="arrow"/>

  <rect x="590" y="100" width="220" height="80" class="box"/>
  <text x="700" y="135" text-anchor="middle" font-size="16" font-weight="600">AI Learning</text>
  <text x="700" y="155" text-anchor="middle" font-size="12" fill="#86868b">Ratings & taste</text>

  <line x1="810" y1="140" x2="860" y2="140" class="arrow"/>

  <rect x="860" y="100" width="220" height="80" class="box"/>
  <text x="970" y="135" text-anchor="middle" font-size="16" font-weight="600">Auto-DJ</text>
  <text x="970" y="155" text-anchor="middle" font-size="12" fill="#86868b">Smart queueing</text>

  <!-- Features -->
  <rect x="80" y="250" width="240" height="100" class="box"/>
  <text x="200" y="280" text-anchor="middle" font-size="14" font-weight="600">Music Control</text>
  <text x="200" y="300" text-anchor="middle" font-size="11" fill="#86868b">Play, pause, skip, shuffle</text>
  <text x="200" y="320" text-anchor="middle" font-size="11" fill="#86868b">Playlist management</text>

  <rect x="360" y="250" width="240" height="100" class="box"/>
  <text x="480" y="280" text-anchor="middle" font-size="14" font-weight="600">Smart Playlists</text>
  <text x="480" y="300" text-anchor="middle" font-size="11" fill="#86868b">Auto-create every 10 songs</text>
  <text x="480" y="320" text-anchor="middle" font-size="11" fill="#86868b">Taste-based selection</text>

  <rect x="640" y="250" width="240" height="100" class="box"/>
  <text x="760" y="280" text-anchor="middle" font-size="14" font-weight="600">Discovery Mode</text>
  <text x="760" y="300" text-anchor="middle" font-size="11" fill="#86868b">Find hidden gems</text>
  <text x="760" y="320" text-anchor="middle" font-size="11" fill="#86868b">Based on preferences</text>

  <rect x="920" y="250" width="240" height="100" class="box"/>
  <text x="1040" y="280" text-anchor="middle" font-size="14" font-weight="600">Learning System</text>
  <text x="1040" y="300" text-anchor="middle" font-size="11" fill="#86868b">Track ratings & loved</text>
  <text x="1040" y="320" text-anchor="middle" font-size="11" fill="#86868b">Improve over time</text>
</svg>
